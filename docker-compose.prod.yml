services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./deploy-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3100
      PAPERCLIP_HOME: /home/node/paperclip
      PAPERCLIP_DATA_DIR: /home/node/paperclip
      PAPERCLIP_WORKSPACE_DIR: /workspace
      PAPERCLIP_INSTANCE_ID: ${PAPERCLIP_INSTANCE_ID}
      PAPERCLIP_IMPORT_PATH: /workspace/import-package
      PAPERCLIP_COMPANY_BUDGET_CENTS: ${PAPERCLIP_COMPANY_BUDGET_CENTS:-5000}
      PAPERCLIP_LEAD_AGENT_BUDGET_CENTS: ${PAPERCLIP_LEAD_AGENT_BUDGET_CENTS:-700}
      PAPERCLIP_EXEC_AGENT_BUDGET_CENTS: ${PAPERCLIP_EXEC_AGENT_BUDGET_CENTS:-300}
      PAPERCLIP_BUDGET_WARN_PERCENT: ${PAPERCLIP_BUDGET_WARN_PERCENT:-70}
      PAPERCLIP_BUDGET_HARD_STOP_ENABLED: ${PAPERCLIP_BUDGET_HARD_STOP_ENABLED:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./paperclip-data:/home/node/paperclip
      - ./workspace:/workspace
      - ./codex-home:/home/node/.codex
    expose:
      - "3101"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3100/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy-data/caddy/data:/data
      - ./deploy-data/caddy/config:/config
    depends_on:
      paperclip:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
