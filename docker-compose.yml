services:
  postgres:
    image: postgres:16-alpine
    container_name: paperclip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip_password
      POSTGRES_DB: paperclip
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "54329:5432"

  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paperclip
    restart: unless-stopped
    ports:
      - "3100:3101"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3100
      PAPERCLIP_HOME: /home/node/paperclip
      PAPERCLIP_DATA_DIR: /home/node/paperclip
      PAPERCLIP_WORKSPACE_DIR: /workspace
      DATABASE_URL: postgresql://paperclip:paperclip_password@postgres:5432/paperclip
    volumes:
      - ./paperclip-data:/home/node/paperclip
      - ./workspace:/workspace
      - ./codex-home:/home/node/.codex
    depends_on:
      - postgres

volumes:
  postgres-data:
